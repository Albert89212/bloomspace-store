# /etc/nginx/sites-available/sadova
# SADOVA — Nginx reverse proxy для TanStack Start (порт 3000)

upstream sadova_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP → HTTPS (certbot допишет 301 автоматически)
server {
    listen 80;
    listen [::]:80;
    server_name sadova.ru www.sadova.ru;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sadova.ru www.sadova.ru;

    # SSL — заполнится через certbot --nginx
    # ssl_certificate     /etc/letsencrypt/live/sadova.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sadova.ru/privkey.pem;

    client_max_body_size 25M;

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml
               font/woff font/woff2 application/x-font-ttf;

    # Статика с длинным кэшем
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|webp|avif|svg|mp4|webm)$ {
        proxy_pass http://sadova_app;
        proxy_cache_valid 200 30d;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Все остальные запросы — SSR / API
    location / {
        proxy_pass http://sadova_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}